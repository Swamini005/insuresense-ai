version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: insuresense-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # In Docker (Nginx proxies /api to backend), so use relative URL
        VITE_API_URL: ""
    container_name: insuresense-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
