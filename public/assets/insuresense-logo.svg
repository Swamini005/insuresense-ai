<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none">
  <!-- Icon group -->
  <g transform="translate(0, 0)">
    <!-- Arc (inverted U) -->
    <path d="M28 72 C28 34, 62 6, 80 6 C98 6, 132 34, 132 72"
          stroke="#1E1B2E" stroke-width="16" stroke-linecap="round" fill="none"/>

    <!-- Purple center node -->
    <circle cx="80" cy="78" r="11" fill="#7C3AED"/>

    <!-- Branch: center-left -->
    <line x1="80" y1="78" x2="52" y2="108" stroke="#1E1B2E" stroke-width="5" stroke-linecap="round"/>
    <!-- Branch: center-right -->
    <line x1="80" y1="78" x2="108" y2="108" stroke="#1E1B2E" stroke-width="5" stroke-linecap="round"/>
    <!-- Branch: straight down -->
    <line x1="80" y1="78" x2="80" y2="112" stroke="#1E1B2E" stroke-width="5" stroke-linecap="round"/>

    <!-- End nodes -->
    <circle cx="52" cy="108" r="8" fill="#1E1B2E"/>
    <circle cx="108" cy="108" r="8" fill="#1E1B2E"/>
    <circle cx="80" cy="112" r="6" fill="#1E1B2E"/>
  </g>

  <!-- Text: InsureSense -->
  <text x="160" y="80" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="800" font-style="normal" letter-spacing="-1" fill="#1E1B2E">InsureSense</text>

  <!-- Text: .ai -->
  <text x="456" y="80" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="800" font-style="normal" letter-spacing="-1" fill="#7C3AED">.ai</text>
</svg>
