<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="investBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coinGrad">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#investBg)"/>
  
  <!-- Decorative circles -->
  <circle cx="700" cy="80" r="100" fill="#DDD6FE" opacity="0.3"/>
  <circle cx="120" cy="320" r="80" fill="#C4B5FD" opacity="0.2"/>
  
  <g transform="translate(100, 80)">
    <!-- Chart bars with shadows -->
    <g filter="url(#shadow)">
      <rect x="80" y="170" width="55" height="90" fill="url(#barGrad1)" rx="10"/>
      <rect x="170" y="130" width="55" height="130" fill="url(#barGrad1)" rx="10"/>
      <rect x="260" y="95" width="55" height="165" fill="url(#barGrad2)" rx="10"/>
      <rect x="350" y="55" width="55" height="205" fill="url(#barGrad2)" rx="10"/>
      <rect x="440" y="20" width="55" height="240" fill="url(#barGrad2)" rx="10"/>
    </g>
    
    <!-- Grid lines -->
    <line x1="60" y1="260" x2="530" y2="260" stroke="#C7D2FE" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="180" x2="530" y2="180" stroke="#C7D2FE" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="100" x2="530" y2="100" stroke="#C7D2FE" stroke-width="1" opacity="0.5"/>
    
    <!-- Growth trend line -->
    <path d="M 107 210 L 197 165 L 287 127 L 377 82 L 467 50" 
          stroke="#10B981" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="107" cy="210" r="6" fill="#10B981"/>
    <circle cx="197" cy="165" r="6" fill="#10B981"/>
    <circle cx="287" cy="127" r="6" fill="#10B981"/>
    <circle cx="377" cy="82" r="6" fill="#10B981"/>
    <circle cx="467" cy="50" r="8" fill="#10B981"/>
    
    <!-- Arrow -->
    <path d="M 467 30 L 485 50 L 467 70" stroke="#10B981" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Coins stack -->
    <g filter="url(#shadow)">
      <ellipse cx="560" cy="140" rx="38" ry="10" fill="#D97706" opacity="0.5"/>
      <ellipse cx="560" cy="130" rx="38" ry="10" fill="url(#coinGrad)"/>
      <ellipse cx="560" cy="115" rx="38" ry="10" fill="url(#coinGrad)"/>
      <ellipse cx="560" cy="100" rx="38" ry="10" fill="url(#coinGrad)"/>
      <circle cx="560" cy="85" r="38" fill="url(#coinGrad)" stroke="#D97706" stroke-width="2"/>
      <text x="560" y="95" font-family="'Inter', Arial, sans-serif" font-size="32" font-weight="bold" fill="#92400E" text-anchor="middle">₹</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="400" y="365" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="700" fill="#4C1D95" text-anchor="middle" letter-spacing="-0.5">Grow Your Wealth Smartly</text>
</svg>
