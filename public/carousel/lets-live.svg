<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="healthBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF9F3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFF7ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFEDD5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA5A5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="heartGlow">
      <stop offset="0%" style="stop-color:#FCA5A5;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="400" fill="url(#healthBg)"/>
  
  <!-- Decorative medical icons -->
  <circle cx="120" cy="100" r="60" fill="#FED7AA" opacity="0.3"/>
  <circle cx="680" cy="320" r="50" fill="#FED7AA" opacity="0.3"/>
  
  <g transform="translate(400, 190)">
    <!-- Heart glow background -->
    <ellipse cx="0" cy="0" rx="140" ry="140" fill="url(#heartGlow)"/>
    
    <!-- Main heart with gradient -->
    <g filter="url(#glow)">
      <path d="M 0,-50 C -55,-105 -130,-105 -130,-45 C -130,5 0,75 0,75 C 0,75 130,5 130,-45 C 130,-105 55,-105 0,-50 Z" 
            fill="url(#heartGrad)" stroke="#B91C1C" stroke-width="3"/>
    </g>
    
    <!-- Pulse ECG line -->
    <g filter="url(#softShadow)">
      <path d="M -70,5 L -50,5 L -40,-25 L -30,35 L -20,5 L -10,-20 L 0,15 L 10,5 L 25,5" 
            stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="-40" cy="-25" r="3" fill="white"/>
      <circle cx="-30" cy="35" r="3" fill="white"/>
      <circle cx="-10" cy="-20" r="3" fill="white"/>
      <circle cx="0" cy="15" r="3" fill="white"/>
    </g>
    
    <!-- Animated pulse dots -->
    <circle cx="-70" cy="5" r="4" fill="#10B981" opacity="0.8"/>
    <circle cx="25" cy="5" r="4" fill="#10B981" opacity="0.8"/>
  </g>
  
  <!-- Medical cross with depth -->
  <g transform="translate(650, 120)" filter="url(#softShadow)">
    <rect x="-18" y="-45" width="36" height="90" fill="#10B981" rx="8"/>
    <rect x="-45" y="-18" width="90" height="36" fill="#10B981" rx="8"/>
    <rect x="-15" y="-42" width="30" height="84" fill="#34D399" rx="6" opacity="0.7"/>
    <rect x="-42" y="-15" width="84" height="30" fill="#34D399" rx="6" opacity="0.7"/>
    <circle cx="0" cy="0" r="12" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Shield protection icon -->
  <g transform="translate(150, 280)" filter="url(#softShadow)">
    <path d="M 0,-30 L -25,-20 L -25,0 C -25,15 0,30 0,30 C 0,30 25,15 25,0 L 25,-20 Z" 
          fill="#7C3AED" stroke="#6D28D9" stroke-width="2"/>
    <path d="M -8,0 L -2,6 L 10,-8" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <text x="400" y="365" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="700" fill="#92400E" text-anchor="middle" letter-spacing="-0.5">Health Coverage for Life</text>
</svg>
