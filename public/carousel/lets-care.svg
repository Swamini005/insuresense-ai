<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="familyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF5FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F3E8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E9D5FF;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="umbrellaGrad">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </radialGradient>
    <filter id="familyShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="person1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="person2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#familyBg)"/>
  
  <!-- Decorative hearts background -->
  <circle cx="120" cy="100" r="40" fill="#FDE68A" opacity="0.2"/>
  <circle cx="680" cy="300" r="50" fill="#FCA5A5" opacity="0.2"/>
  
  <g transform="translate(240, 140)">
    <!-- Protective umbrella with depth -->
    <g filter="url(#familyShadow)">
      <path d="M 60,-60 Q 160,-130 260,-60 L 260,-45 Q 160,-105 60,-45 Z" 
            fill="url(#umbrellaGrad)" stroke="#047857" stroke-width="3"/>
      <path d="M 70,-55 Q 160,-115 250,-55" stroke="#34D399" stroke-width="2" fill="none" opacity="0.6"/>
      <rect x="158" y="-60" width="4" height="120" fill="#78716C" rx="2"/>
      <path d="M 150,-65 Q 160,-55 170,-65" stroke="#78716C" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Family group -->
    <g filter="url(#familyShadow)">
      <!-- Parent 1 -->
      <ellipse cx="90" cy="175" rx="25" ry="8" fill="#1F2937" opacity="0.15"/>
      <circle cx="90" cy="85" r="32" fill="url(#person1)"/>
      <ellipse cx="90" cy="100" rx="18" ry="20" fill="#E0E7FF" opacity="0.7"/>
      <path d="M 65 117 L 65 160 Q 65 165 70 165 L 110 165 Q 115 165 115 160 L 115 117 Z" fill="url(#person1)"/>
      <circle cx="85" cy="90" r="3" fill="white"/>
      <circle cx="95" cy="90" r="3" fill="white"/>
      
      <!-- Child -->
      <ellipse cx="160" cy="175" rx="20" ry="6" fill="#1F2937" opacity="0.15"/>
      <circle cx="160" cy="115" r="24" fill="#C4B5FD"/>
      <ellipse cx="160" cy="128" rx="14" ry="16" fill="#E0E7FF" opacity="0.7"/>
      <path d="M 142 140 L 142 170 Q 142 174 146 174 L 174 174 Q 178 174 178 170 L 178 140 Z" fill="#C4B5FD"/>
      <circle cx="155" cy="120" r="2.5" fill="white"/>
      <circle cx="165" cy="120" r="2.5" fill="white"/>
      <path d="M 152 130 Q 160 135 168 130" stroke="#7C3AED" stroke-width="2" fill="none" stroke-linecap="round"/>
      
      <!-- Parent 2 -->
      <ellipse cx="230" cy="175" rx="25" ry="8" fill="#1F2937" opacity="0.15"/>
      <circle cx="230" cy="85" r="32" fill="url(#person2)"/>
      <ellipse cx="230" cy="100" rx="18" ry="20" fill="#E0E7FF" opacity="0.7"/>
      <path d="M 205 117 L 205 160 Q 205 165 210 165 L 250 165 Q 255 165 255 160 L 255 117 Z" fill="url(#person2)"/>
      <circle cx="225" cy="90" r="3" fill="white"/>
      <circle cx="235" cy="90" r="3" fill="white"/>
    </g>
    
    <!-- Floating hearts -->
    <g opacity="0.8">
      <path d="M 10,90 C 6,80 -2,80 -2,90 C -2,97 10,108 10,108 C 10,108 22,97 22,90 C 22,80 14,80 10,90 Z" fill="#F472B6"/>
      <path d="M 310,90 C 306,80 298,80 298,90 C 298,97 310,108 310,108 C 310,108 322,97 322,90 C 322,80 314,80 310,90 Z" fill="#F472B6"/>
      <path d="M 160,10 C 156,0 148,0 148,10 C 148,17 160,28 160,28 C 160,28 172,17 172,10 C 172,0 164,0 160,10 Z" fill="#FCA5A5"/>
    </g>
  </g>
  
  <text x="400" y="365" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="700" fill="#4C1D95" text-anchor="middle" letter-spacing="-0.5">Protect Your Loved Ones</text>
</svg>
