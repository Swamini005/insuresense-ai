<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DBEAFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BFDBFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <filter id="carShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="2" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="400" fill="url(#skyGrad)"/>
  
  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="50" ry="30" fill="white" opacity="0.7"/>
  <ellipse cx="180" cy="75" rx="40" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="600" cy="100" rx="60" ry="35" fill="white" opacity="0.6"/>
  <ellipse cx="640" cy="95" rx="50" ry="30" fill="white" opacity="0.6"/>
  
  <g transform="translate(50, 50)">
    <!-- Winding road with depth -->
    <path d="M 50 280 Q 150 250, 250 240 Q 350 230, 450 200 Q 550 170, 650 140" 
          fill="url(#roadGrad)" stroke="none" stroke-width="100" opacity="0.3"/>
    <path d="M 50 280 Q 150 250, 250 240 Q 350 230, 450 200 Q 550 170, 650 140" 
          stroke="url(#roadGrad)" stroke-width="85" fill="none" stroke-linecap="round"/>
    <path d="M 50 280 Q 150 250, 250 240 Q 350 230, 450 200 Q 550 170, 650 140" 
          stroke="#FCD34D" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="35,25" opacity="0.9"/>
    
    <!-- Modern car with shadow -->
    <g transform="translate(560, 110)" filter="url(#carShadow)">
      <path d="M 5 25 L 15 5 L 60 5 L 75 25 L 75 45 L 5 45 Z" fill="url(#carGrad)" stroke="#4C1D95" stroke-width="2"/>
      <rect x="18" y="8" width="30" height="18" fill="#93C5FD" rx="3" opacity="0.7"/>
      <circle cx="20" cy="48" r="10" fill="#1F2937" stroke="#475569" stroke-width="2"/>
      <circle cx="20" cy="48" r="5" fill="#6B7280"/>
      <circle cx="60" cy="48" r="10" fill="#1F2937" stroke="#475569" stroke-width="2"/>
      <circle cx="60" cy="48" r="5" fill="#6B7280"/>
      <ellipse cx="10" cy="30" rx="3" ry="5" fill="#FCD34D" opacity="0.8"/>
    </g>
    
    <!-- Destination with flag and shield -->
    <g transform="translate(640, 90)">
      <ellipse cx="10" cy="60" rx="15" ry="5" fill="#1F2937" opacity="0.2"/>
      <rect x="8" y="0" width="4" height="60" fill="#475569"/>
      <path d="M 12 8 L 55 18 L 12 28 Z" fill="#10B981" stroke="#059669" stroke-width="2"/>
      <path d="M 12 12 L 45 18 L 12 24 Z" fill="#34D399" opacity="0.6"/>
    </g>
    
    <!-- Shield symbol -->
    <g transform="translate(680, 60)">
      <path d="M 0 0 L -20 5 L -20 25 C -20 35 0 45 0 45 C 0 45 20 35 20 25 L 20 5 Z" 
            fill="#7C3AED" stroke="#6D28D9" stroke-width="2" opacity="0.9"/>
      <path d="M -5 15 L 0 20 L 10 8" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <text x="400" y="365" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="700" fill="#4C1D95" text-anchor="middle" letter-spacing="-0.5">Your Journey, Our Protection</text>
</svg>
